spring.application.name=aml-backend

# Neo4j connection settings
neo4j.uri=${NEO4J_URI:neo4j://127.0.0.1:7687}
neo4j.username=${NEO4J_USERNAME:neo4j}
neo4j.password=${NEO4J_PASSWORD:neo4j1234}

# Python inference service
inference.url=${INFERENCE_URL:http://localhost:8000}

# Kafka transaction buffer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=aml-transaction-buffer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aml.model
spring.kafka.consumer.properties.spring.json.value.default.type=com.aml.model.Transaction
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

transactions.topic=transactions-buffer
transactions.batch.flush-interval-ms=5000
transactions.batch.max-size=25

# Server port
server.port=8080

# Show SQL-like logs for debugging
logging.level.com.aml=DEBUG
