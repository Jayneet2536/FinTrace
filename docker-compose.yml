version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fundflow_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fundflow_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  neo4j:
    image: neo4j:5.14.0
    container_name: fundflow_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j1234
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    container_name: fundflow_inference
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: fundflow_backend
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - neo4j
      - inference
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=neo4j1234
      - INFERENCE_URL=http://inference:8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fundflow_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  transaction-generator:
    build:
      context: ./transaction
      dockerfile: Dockerfile
    container_name: fundflow_transaction_generator
    depends_on:
      - backend
    profiles: ["cli"]

volumes:
  neo4j_data: